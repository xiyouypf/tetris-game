<!DOCTYPE html>
<html>
<head>
    <title>Tetris</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Tetris</h1>
    <div class="container">
        <canvas id="tetris" width="240" height="400"></canvas>
        <div class="info">
            <p>Score: <span id="score">0</span></p>
            <p>Next:</p>
            <canvas id="next" width="80" height="80"></canvas>
        </div>
    </div>
    <script src="script.js"></script>
    <div class="controls">
        <h2>Controls</h2>
        <ul>
            <li><strong>Left/Right Arrow:</strong> Move</li>
            <li><strong>Down Arrow:</strong> Speed Up</li>
            <li><strong>Q / W:</strong> Rotate</li>
        </ul>
    </div>
</body>
</html>
