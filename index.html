
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <meta name="baidu-site-verification" content="codeva-pmGQFz0pQu" />

<body>
    <div class="game-container">
        <canvas id="tetris" width="240" height="400"></canvas>
        <div class="side-panel">
            <div class="score-container">
                <span class="score-label">分数：</span><span id="score">0</span>

            <div>

                <canvas id="next" width="80" height="80"></canvas>

                    <canvas id="power-up-block" width="20" height="20"></canvas>
                    <span id="power-up-count">0</span>
                    <button id="btn-add-power-up">+</button>
                </div>
                <button id="btn-use-power-up">使用</button>
            </div>
            <div class="controls">
                <button id="btn-rotate">↻</button>
                <button id="btn-down">↓</button>
                <button id="btn-left">←</button>
                <button id="btn-right">→</button>
            </div>
        </div>
    </div>
