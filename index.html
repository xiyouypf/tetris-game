
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <meta name="baidu-site-verification" content="codeva-pmGQFz0pQu" />
    <script>(function(s){s.dataset.zone='10790391',s.src='https://nap5k.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <div id="start-screen" class="overlay">
        <div class="overlay-content">
            <h1>俄罗斯方块</h1>
            <button id="btn-start-game">开始游戏</button>
        </div>
    </div>
    <div id="game-over-screen" class="overlay" style="display: none;">
        <div class="overlay-content">
            <h1>游戏结束</h1>
            <p>你的分数: <span id="final-score">0</span></p>
            <button id="btn-play-again">再玩一次</button>
        </div>
    </div>
    <div class="game-container">
        <canvas id="tetris" width="240" height="400"></canvas>
        <div class="right-column">
            <div class="side-panel">
                <div class="score-container">
                    <span class="score-label">分数：</span><span id="score">0</span>
                </div>
                <div>
                    <h2>下一个</h2>
                    <canvas id="next" width="80" height="80"></canvas>
                </div>
                <div>
                    <h2>万能方块</h2>
                    <div class="power-up-container">
                        <canvas id="power-up-block" width="20" height="20"></canvas>
                        <span id="power-up-count">0</span>
                        <button id="btn-add-power-up">+</button>
                    </div>
                    <button id="btn-use-power-up">使用</button>
                </div>
            </div>
            <div class="controls">
                <button id="btn-rotate">↻</button>
                <button id="btn-down">↓</button>
                <button id="btn-left">←</button>
                <button id="btn-right">→</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
